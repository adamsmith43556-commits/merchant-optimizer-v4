<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Terminal | JM Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding: 15px; overflow-x: hidden; }

        /* Dashboard Header */
        .header-stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-pill { background: var(--card); flex: 1; padding: 18px; border-radius: 24px; border: 1px solid var(--border); position: relative; }
        .s-label { font-size: 9px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .s-val { font-size: 20px; font-weight: 800; margin-top: 4px; }

        /* Main Workspace */
        .terminal-core { background: var(--card); border-radius: 35px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .batch-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .batch-title { font-size: 13px; font-weight: 800; color: #94a3b8; }
        .batch-count { font-size: 16px; font-weight: 800; color: var(--primary); }
        
        .progress-track { height: 6px; background: #020617; border-radius: 10px; overflow: hidden; margin-bottom: 25px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #60a5fa); width: 0%; transition: 1s ease; }

        /* Product Visualizer */
        .visualizer { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #000; 
            border-radius: 28px; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid #1e293b; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        #prod-img { width: 100%; height: 100%; object-fit: cover; display: none; transition: opacity 0.5s ease; }
        
        /* Premium Spinner */
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .analysis-log { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(8px); 
            padding: 12px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 10px; 
            color: var(--success); 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }

        .btn-optimize { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 22px; 
            border-radius: 20px; 
            font-size: 17px; 
            font-weight: 800; 
            cursor: pointer; 
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.3); 
        }
        .btn-optimize:disabled { opacity: 0.5; }

        /* Combination Task Overlay */
        #combo-trap { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(12px); }
        .trap-card { background: white; color: #020617; border-radius: 40px; padding: 40px 25px; text-align: center; max-width: 400px; }
        .deficit-value { font-size: 42px; font-weight: 900; color: #e11d48; margin: 10px 0; }
        .btn-resolve { background: #020617; color: white; width: 100%; padding: 20px; border-radius: 18px; font-weight: 800; border: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-pill">
            <div class="s-label">Asset Balance</div>
            <div class="s-val" id="total-bal">$20.00</div>
        </div>
        <div class="stat-pill">
            <div class="s-label">Session Profit</div>
            <div class="s-val" id="total-prof" style="color: var(--success);">+$0.00</div>
        </div>
    </div>

    <div class="terminal-core">
        <div class="batch-header">
            <div class="batch-title">OPTIMIZATION QUEUE</div>
            <div class="batch-count"><span id="curr-task">0</span> / 40</div>
        </div>
        <div class="progress-track"><div class="progress-bar" id="p-bar"></div></div>

        <div class="visualizer">
            <div class="spinner" id="loader"></div>
            <img src="" id="prod-img">
            <div class="analysis-log" id="log">READY FOR GLOBAL SYNC...</div>
        </div>

        <button class="btn-optimize" id="optBtn" onclick="runOptimization()">OPTIMIZE NEXT ASSET</button>
    </div>

    <div id="combo-trap">
        <div class="trap-card">
            <div style="font-size: 40px;">💎</div>
            <h2 style="font-weight: 900; margin: 10px 0;">PREMIUM BATCH</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Combination Task detected. High-value liquidity required to finalize.</p>
            <div style="background: #fff1f2; padding: 20px; border-radius: 25px;">
                <div style="font-size: 10px; font-weight: 800; color: #e11d48;">REQUIRED DEPOSIT</div>
                <div class="deficit-value">$40.00</div>
                <div style="font-size: 11px; font-weight: 700; color: #475569;">≈ ₦64,500.00</div>
            </div>
            <button class="btn-resolve" onclick="window.location.href='checkout.html'">CLEAR & WITHDRAW</button>
        </div>
    </div>

    <script>
        let bal = 20.00;
        let prof = 0.00;
        let count = 0;

        // Guaranteed Premium Product Images
        const items = [
            "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80",
            "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&q=80",
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80",
            "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600&q=80",
            "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600&q=80",
            "https://images.unsplash.com/photo-1585333127302-729217a6ec96?w=600&q=80"
        ];

        function runOptimization() {
            const btn = document.getElementById('optBtn');
            const img = document.getElementById('prod-img');
            const loader = document.getElementById('loader');
            const log = document.getElementById('log');

            btn.disabled = true;
            btn.innerText = "ALLOCATING...";
            img.style.display = "none";
            loader.style.display = "block";
            log.innerHTML = "> ACCESSING MERCHANT NODE...";

            // Select a random image from our gallery
            img.src = items[Math.floor(Math.random() * items.length)];

            // Wait for image to load before updating UI
            img.onload = function() {
                setTimeout(() => {
                    count++;
                    
                    if(count === 35) {
                        document.getElementById('combo-trap').style.display = 'flex';
                        return;
                    }

                    bal += 4.50;
                    prof += 4.50;

                    document.getElementById('total-bal').innerText = "$" + bal.toFixed(2);
                    document.getElementById('total-prof').innerText = "+$" + prof.toFixed(2);
                    document.getElementById('curr-task').innerText = count;
                    document.getElementById('p-bar').style.width = (count/40 * 100) + "%";
                    
                    loader.style.display = "none";
                    img.style.display = "block";
                    log.innerHTML = `> SUCCESS: +$4.50 PROCESSED`;
                    
                    btn.disabled = false;
                    btn.innerText = "OPTIMIZE NEXT ASSET";
                }, 1200);
            };
        }
    </script>
</body>
</html>
