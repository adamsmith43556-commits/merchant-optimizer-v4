<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Asset Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 15px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .val { font-size: 22px; font-weight: 800; }

        .display-terminal { 
            width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 35px; 
            margin-bottom: 25px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border: 2px solid var(--border); position: relative;
        }

        #prod-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .loader-ring { 
            width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-action { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; 
            width: 100%; padding: 22px; border-radius: 22px; font-size: 18px; font-weight: 800; 
            cursor: pointer; box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
        }
        .btn-action:disabled { opacity: 0.5; }

        /* Combination Trap Styles */
        #trap-overlay { display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .trap-box { background: white; color: #000; border-radius: 40px; padding: 40px 25px; text-align: center; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="stat-grid">
        <div class="stat-card">
            <div class="label">Balance</div>
            <div class="val" id="bal">$20.00</div>
        </div>
        <div class="stat-card">
            <div class="label">Commission</div>
            <div class="val" id="prof" style="color: var(--success);">+$0.00</div>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 12px; font-weight: 800; font-size: 14px; color: #94a3b8;">
        TASK PROGRESS: <span id="count" style="color: var(--primary);">0</span> / 40
    </div>

    <div class="display-terminal">
        <div class="loader-ring" id="loader" style="display: none;"></div>
        <img src="" id="prod-img">
        <div id="init-text" style="font-weight: 800; color: #475569;">INITIALIZING DATA NODE...</div>
    </div>

    <button class="btn-action" id="runBtn" onclick="processTask()">OPTIMIZE NEXT ASSET</button>

    <div id="trap-overlay">
        <div class="trap-box">
            <div style="font-size: 50px;">🌟</div>
            <h2 style="font-weight: 900; margin: 10px 0;">COMBO REWARD</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">You have unlocked a <b>High-Value Combination Task</b>. Payout is 15x normal rate.</p>
            <div style="background: #fff1f2; padding: 25px; border-radius: 25px; border: 1.5px dashed #fecdd3;">
                <div style="font-size: 10px; font-weight: 800; color: #e11d48; text-transform: uppercase;">Required Liquidity</div>
                <div style="font-size: 42px; font-weight: 900; color: #e11d48; margin: 5px 0;">$40.00</div>
                <div style="font-size: 12px; font-weight: 700; color: #475569;">≈ ₦65,000.00</div>
            </div>
            <button onclick="window.location.href='checkout.html'" style="background: #020617; color: white; width: 100%; padding: 20px; border-radius: 18px; border: none; margin-top: 25px; font-weight: 800;">FINISH & WITHDRAW</button>
        </div>
    </div>

    <script>
        let balance = 20.00;
        let profit = 0.00;
        let taskNum = 0;

        // 10 DIRECT PREMIUM LINKS (Luxury/Tech Focus)
        const gallery = [
            "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600",
            "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600",
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600",
            "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600",
            "https://images.unsplash.com/photo-1585333127302-729217a6ec96?w=600",
            "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600",
            "https://images.unsplash.com/photo-1546868891-7596e1850fe7?w=600",
            "https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600",
            "https://images.unsplash.com/photo-1524678606370-a47ad25cb82a?w=600",
            "https://images.unsplash.com/photo-1503602642458-232111445657?w=600"
        ];

        function processTask() {
            const btn = document.getElementById('runBtn');
            const img = document.getElementById('prod-img');
            const loader = document.getElementById('loader');
            const initText = document.getElementById('init-text');

            btn.disabled = true;
            btn.innerText = "SYNCING WITH MERCHANT...";
            
            initText.style.display = 'none';
            img.style.display = 'none';
            loader.style.display = 'block';

            // Select random image from our fixed 10-link list
            img.src = gallery[Math.floor(Math.random() * gallery.length)];

            img.onload = function() {
                setTimeout(() => {
                    taskNum++;
                    
                    // TRAP TRIGGER AT 35
                    if(taskNum === 35) {
                        document.getElementById('trap-overlay').style.display = 'flex';
                        return;
                    }

                    balance += 4.50;
                    profit += 4.50;

                    document.getElementById('bal').innerText = "$" + balance.toFixed(2);
                    document.getElementById('prof').innerText = "+$" + profit.toFixed(2);
                    document.getElementById('count').innerText = taskNum;

                    loader.style.display = 'none';
                    img.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "OPTIMIZE NEXT ASSET";
                }, 1000); 
            };

            // Error handler to prevent sticking if one link fails
            img.onerror = function() {
                img.src = gallery[0]; // fallback to first image
                img.onload();
            };
        }
    </script>
</body>
</html>
