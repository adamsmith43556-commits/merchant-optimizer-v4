<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Enrollment | JM Global Alliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; --text-dim: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }

        .form-container { width: 100%; max-width: 480px; background: var(--card); border-radius: 40px; padding: 45px 30px; border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.5); margin-top: 20px; }
        
        .form-header { margin-bottom: 40px; }
        .form-header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .form-header p { font-size: 14px; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1.5px; }
        
        input, select {
            width: 100%;
            background: #020617;
            border: 1.5px solid var(--border);
            padding: 18px 20px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        .kyc-badge {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 35px;
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 35px; cursor: pointer; }
        .checkbox-group input { width: 22px; height: 22px; margin: 0; cursor: pointer; accent-color: var(--primary); }
        .checkbox-group label { font-size: 12px; color: var(--text-dim); text-transform: none; letter-spacing: 0; line-height: 1.4; font-weight: 600; }

        .btn-enroll {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            width: 100%;
            padding: 24px;
            border-radius: 22px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
            transition: 0.3s;
        }

        .btn-enroll:hover { transform: translateY(-2px); box-shadow: 0 20px 45px rgba(37, 99, 235, 0.4); }

        .secure-lock {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 10px;
            color: #475569;
            font-weight: 800;
            margin-top: 30px;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>Agent Enrollment</h1>
            <p>Onboard as a verified Merchant Optimization Agent for the West Africa Division.</p>
        </div>

        <div class="kyc-badge">
            <b style="color: #fff;">🔐 COMPLIANCE PROTOCOL:</b><br>
            All agents must provide valid payout details. Earnings are processed through automated smart contracts to ensure 100% liquidity security.
        </div>

        <div class="input-group">
            <label>Invitation Token</label>
            <input type="text" id="invite" placeholder="6-Digit Management Code" required>
        </div>

        <div class="input-group">
            <label>Legal Full Name</label>
            <input type="text" id="fullname" placeholder="John Doe / Jane Smith" required>
        </div>

        <div class="input-group">
            <label>Preferred Settlement Asset</label>
            <select id="asset">
                <option value="USDT">USDT (Tether Stablecoin)</option>
                <option value="NGN">Nigerian Naira (Bank Transfer)</option>
                <option value="BTC">Bitcoin (BTC)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Withdrawal Address / Account</label>
            <input type="text" id="address" placeholder="TRC20 Address or NGN Bank Details">
        </div>

        <div class="checkbox-group" onclick="document.getElementById('terms').click()">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the Agent Service Level Agreement (SLA) and acknowledge that a $20.00 sign-up liquidity bonus will be credited upon activation.</label>
        </div>

        <button class="btn-enroll" onclick="processEnrollment()">VERIFY & INITIALIZE PORTAL</button>

        <div class="secure-lock">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            ENCRYPTED BY NORTON ENTERPRISE SECURE
        </div>
    </div>

    <script>
        function processEnrollment() {
            const invite = document.getElementById('invite').value;
            const name = document.getElementById('fullname').value;
            const terms = document.getElementById('terms').checked;

            if(!invite || !name) {
                alert("ERROR: Missing mandatory enrollment fields.");
                return;
            }
            if(!terms) {
                alert("ERROR: You must accept the SLA terms to proceed.");
                return;
            }

            const btn = document.querySelector('.btn-enroll');
            btn.innerHTML = 'VERIFYING DATA...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'portal.html';
            }, 2500);
        }
    </script>
</body>
</html>
