<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Agent Registration | JM Alliance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #020617; --card: #0f172a; --border: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

        .auth-card { width: 100%; max-width: 480px; background: var(--card); border-radius: 40px; padding: 40px 25px; border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        
        .auth-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--primary), var(--success)); }

        .header { margin-bottom: 35px; text-align: left; }
        .header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { font-size: 14px; color: #94a3b8; margin-top: 10px; line-height: 1.6; }

        .promo-banner { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 15px; border-radius: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .promo-icon { background: var(--success); color: white; width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .promo-text { font-size: 12px; font-weight: 700; color: var(--success); }

        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        input, select {
            width: 100%;
            background: #020617;
            border: 1.5px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); }

        /* THE "EASY-CHECK" BOX */
        .reward-selector { background: rgba(255,255,255,0.03); border: 1.5px solid var(--border); border-radius: 25px; padding: 25px; margin: 30px 0; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .reward-selector.active { border-color: var(--primary); background: rgba(37, 99, 235, 0.08); }
        
        .custom-check { width: 28px; height: 28px; border: 2px solid #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; background: #020617; }
        .reward-selector.active .custom-check { background: var(--primary); border-color: var(--primary); }
        .reward-selector.active .custom-check::after { content: '✓'; color: white; font-weight: 900; }

        .reward-label { font-size: 14px; font-weight: 700; color: #cbd5e1; }
        .reward-label b { color: #fff; }

        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), #1e40af); color: white; border: none; padding: 25px; border-radius: 25px; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 20px 40px rgba(37, 99, 235, 0.25); transition: 0.3s; }
        .btn-submit:active { transform: scale(0.97); }

        .footer-note { text-align: center; font-size: 10px; color: #475569; margin-top: 30px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="header">
        <h1>Join the Network</h1>
        <p>Your regional node is ready for initialization. Please verify your payout details to receive your activation credit.</p>
    </div>

    <div class="promo-banner">
        <div class="promo-icon">🎁</div>
        <div class="promo-text">OFFER: $20.00 (₦32,500) CASH BONUS INCLUDED</div>
    </div>

    <form id="regForm">
        <div class="input-group">
            <label>Full Legal Name</label>
            <input type="text" id="fullname" placeholder="First and Last Name" required>
        </div>

        <div class="input-group">
            <label>Current Country</label>
            <input type="text" id="country" placeholder="e.g., Nigeria" required>
        </div>

        <div class="input-group">
            <label>Payout Channel</label>
            <select id="method">
                <option value="OPay">OPay (Fastest)</option>
                <option value="PalmPay">PalmPay</option>
                <option value="Bank">Local Bank Transfer</option>
                <option value="USDT">Crypto (USDT-BEP20)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Payout Identity Detail</label>
            <input type="text" id="detail" placeholder="Enter phone or wallet number" required>
        </div>

        <input type="checkbox" id="terms" style="display:none" required>
        <div class="reward-selector" id="checkBtn">
            <div class="custom-check"></div>
            <div class="reward-label">Initialize account & claim my <b>$20.00 Bonus</b></div>
        </div>

        <button type="submit" class="btn-submit" id="mainBtn">ACTIVATE PORTAL</button>
    </form>

    <div class="footer-note">
        🔒 SECURE END-TO-END ENCRYPTION ACTIVE
    </div>
</div>

<script>
    const checkBtn = document.getElementById('checkBtn');
    const checkbox = document.getElementById('terms');
    const mainBtn = document.getElementById('mainBtn');

    // Make the entire reward box the toggle for the checkbox
    checkBtn.onclick = () => {
        checkbox.checked = !checkbox.checked;
        checkBtn.classList.toggle('active', checkbox.checked);
    };

    document.getElementById('regForm').onsubmit = (e) => {
        e.preventDefault();
        
        if(!checkbox.checked) {
            alert("Please tap the reward box to claim your bonus before continuing.");
            return;
        }

        const name = document.getElementById('fullname').value;
        localStorage.setItem('agentName', name);

        mainBtn.innerText = "INITIALIZING NODE...";
        mainBtn.style.opacity = "0.6";
        
        setTimeout(() => {
            window.location.href = 'portal.html';
        }, 1500);
    };
</script>

</body>
</html>
