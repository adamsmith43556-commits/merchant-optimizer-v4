<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JM Global | Infrastructure & Node Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #60a5fa;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --glow: rgba(59, 130, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.2) 0%, transparent 50%),
                linear-gradient(rgba(15, 23, 42, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* The Main Portal Card */
        .portal-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 440px;
            padding: 50px 35px;
            border-radius: 45px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(59, 130, 246, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Branding */
        .brand-header {
            margin-bottom: 40px;
        }

        .logo-main {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-main span {
            color: var(--primary);
            text-shadow: 0 0 15px var(--glow);
        }

        .version-tag {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Animated Security Orb */
        .orb-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, var(--primary), #1e40af);
            border-radius: 50%;
            box-shadow: 0 0 40px var(--glow);
            position: relative;
            z-index: 2;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            animation: ring-pulse 3s infinite ease-out;
        }

        .ring:nth-child(2) { animation-delay: 1s; }

        @keyframes ring-pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Console Output */
        .console-box {
            background: #020617;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 35px;
            border: 1px solid #1e293b;
            text-align: left;
            min-height: 100px;
            display: none;
        }

        .console-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--secondary);
            margin-bottom: 5px;
            display: flex;
            gap: 8px;
        }

        .console-line .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Actions */
        .btn-access {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-access:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 45px rgba(37, 99, 235, 0.5);
        }

        .btn-access:active { transform: scale(0.98); }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #475569;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Loading Dots Animation */
        .dots { display: inline-flex; gap: 4px; }
        .dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dot-pulse 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="brand-header">
            <div class="logo-main">JM<span>GLOBAL</span></div>
            <div class="version-tag">Infrasystem Node v7.4.2</div>
        </div>

        <div class="orb-container">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="orb"></div>
        </div>

        <div class="console-box" id="console">
            </div>

        <button class="btn-access" id="accessBtn" onclick="startHandshake()">
            <span>ESTABLISH SECURE LINK</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </button>

        <div class="footer-note">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            SSL-256 BIT ENCRYPTED NODE CONNECTION
        </div>
    </div>

    <script>
        function startHandshake() {
            const btn = document.getElementById('accessBtn');
            const consoleBox = document.getElementById('console');
            
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.innerHTML = 'SYNCHRONIZING<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            
            consoleBox.style.display = 'block';
            
            const logs = [
                "> INITIALIZING HANDSHAKE...",
                "> ROUTING THROUGH LAGOS_NODE_49",
                "> RSA KEY EXCHANGED (4096-BIT)",
                "> MERCHANT_DB CONNECTED",
                "> ACCESS GRANTED: REDIRECTING..."
            ];

            let i = 0;
            function typeLog() {
                if (i < logs.length) {
                    const div = document.createElement('div');
                    div.className = 'console-line';
                    div.innerHTML = `<span>${logs[i]}</span>`;
                    consoleBox.appendChild(div);
                    i++;
                    setTimeout(typeLog, 600);
                } else {
                    setTimeout(() => {
                        window.location.href = 'register.html';
                    }, 800);
                }
            }
            typeLog();
        }
    </script>
</body>
</html>
